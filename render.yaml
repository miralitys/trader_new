databases:
  - name: trader-mvp-db
    databaseName: trader
    user: trader
    plan: basic-256mb

services:
  - type: web
    name: trader-mvp-backend
    runtime: python
    rootDir: apps/api
    plan: standard
    buildCommand: pip install --upgrade pip && pip install -e .
    startCommand: >
      bash -lc "alembic upgrade head &&
      python -m app.db.seed &&
      uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/health
    envVars:
      - key: APP_NAME
        value: Trader Backend
      - key: APP_VERSION
        value: 0.1.0
      - key: API_V1_PREFIX
        value: /api
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: '["https://trader-mvp-frontend.onrender.com","http://localhost:3000"]'
      - key: DATABASE_URL
        fromDatabase:
          name: trader-mvp-db
          property: connectionString
      - key: BINANCE_US_API_BASE_URL
        value: https://api.binance.us
      - key: BINANCE_US_TIMEOUT_SECONDS
        value: "20"
      - key: BINANCE_US_MAX_CANDLES_PER_REQUEST
        value: "1000"
      - key: BINANCE_US_RETRY_ATTEMPTS
        value: "5"
      - key: BINANCE_US_BACKOFF_MIN_SECONDS
        value: "1.0"
      - key: BINANCE_US_BACKOFF_MAX_SECONDS
        value: "8.0"
      - key: MARKET_DATA_INCREMENTAL_OVERLAP_CANDLES
        value: "3"
      - key: DEFAULT_SYMBOLS
        value: BTC-USDT,ETH-USDT,SOL-USDT,BNB-USDT,ADA-USDT,ALPINE-USDT,XRP-USDT,1INCH-USDT,LTC-USDT,BCH-USDT,AVAX-USDT,LINK-USDT,DOGE-USDT,ICP-USDT,GALA-USDT,AXS-USDT,ONDO-USDT,IOTA-USDT,FIL-USDT
      - key: DEFAULT_TIMEFRAMES
        value: 5m,15m,1h,4h
      - key: WORKER_POLL_SECONDS
        value: "15"
      - key: WORKER_MAX_CANDLES_PER_STREAM
        value: "100"
      - key: BACKTEST_STALE_AFTER_SECONDS
        value: "14400"

  - type: worker
    name: trader-mvp-worker
    runtime: python
    rootDir: apps/api
    plan: starter
    buildCommand: pip install --upgrade pip && pip install -e .
    startCommand: >
      bash -lc "alembic upgrade head &&
      python -m app.db.seed &&
      python -m app.workers.runner"
    envVars:
      - key: APP_NAME
        value: Trader Backend
      - key: APP_VERSION
        value: 0.1.0
      - key: API_V1_PREFIX
        value: /api
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: trader-mvp-db
          property: connectionString
      - key: BINANCE_US_API_BASE_URL
        value: https://api.binance.us
      - key: BINANCE_US_TIMEOUT_SECONDS
        value: "20"
      - key: BINANCE_US_MAX_CANDLES_PER_REQUEST
        value: "1000"
      - key: BINANCE_US_RETRY_ATTEMPTS
        value: "5"
      - key: BINANCE_US_BACKOFF_MIN_SECONDS
        value: "1.0"
      - key: BINANCE_US_BACKOFF_MAX_SECONDS
        value: "8.0"
      - key: MARKET_DATA_INCREMENTAL_OVERLAP_CANDLES
        value: "3"
      - key: DEFAULT_SYMBOLS
        value: BTC-USDT,ETH-USDT,SOL-USDT,BNB-USDT,ADA-USDT,ALPINE-USDT,XRP-USDT,1INCH-USDT,LTC-USDT,BCH-USDT,AVAX-USDT,LINK-USDT,DOGE-USDT,ICP-USDT,GALA-USDT,AXS-USDT,ONDO-USDT,IOTA-USDT,FIL-USDT
      - key: DEFAULT_TIMEFRAMES
        value: 5m,15m,1h,4h
      - key: WORKER_POLL_SECONDS
        value: "15"
      - key: WORKER_MAX_CANDLES_PER_STREAM
        value: "100"
      - key: BACKTEST_STALE_AFTER_SECONDS
        value: "14400"

  - type: web
    name: trader-mvp-frontend
    runtime: node
    rootDir: apps/web
    plan: standard
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- --hostname 0.0.0.0 --port $PORT
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://trader-mvp-backend.onrender.com
