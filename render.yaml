databases:
  - name: trader-mvp-db
    databaseName: trader
    user: trader
    plan: basic-256mb

services:
  - type: web
    name: trader-mvp-backend
    runtime: python
    rootDir: apps/api
    plan: free
    buildCommand: pip install --upgrade pip && pip install -e .
    preDeployCommand: alembic upgrade head && python -m app.db.seed
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: APP_NAME
        value: Trader Backend
      - key: APP_VERSION
        value: 0.1.0
      - key: API_V1_PREFIX
        value: /api
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: '["https://trader-mvp-frontend.onrender.com","http://localhost:3000"]'
      - key: DATABASE_URL
        fromDatabase:
          name: trader-mvp-db
          property: connectionString
      - key: COINBASE_API_BASE_URL
        value: https://api.exchange.coinbase.com
      - key: COINBASE_TIMEOUT_SECONDS
        value: "20"
      - key: COINBASE_MAX_CANDLES_PER_REQUEST
        value: "300"
      - key: COINBASE_RETRY_ATTEMPTS
        value: "5"
      - key: COINBASE_BACKOFF_MIN_SECONDS
        value: "1.0"
      - key: COINBASE_BACKOFF_MAX_SECONDS
        value: "8.0"
      - key: MARKET_DATA_INCREMENTAL_OVERLAP_CANDLES
        value: "3"
      - key: DEFAULT_SYMBOLS
        value: BTC-USD,ETH-USD,SOL-USD
      - key: DEFAULT_TIMEFRAMES
        value: 5m,15m,1h
      - key: WORKER_POLL_SECONDS
        value: "15"
      - key: WORKER_MAX_CANDLES_PER_STREAM
        value: "100"

  - type: worker
    name: trader-mvp-worker
    runtime: python
    rootDir: apps/api
    plan: starter
    buildCommand: pip install --upgrade pip && pip install -e .
    preDeployCommand: alembic upgrade head && python -m app.db.seed
    startCommand: python -m app.workers.runner
    envVars:
      - key: APP_NAME
        value: Trader Backend
      - key: APP_VERSION
        value: 0.1.0
      - key: API_V1_PREFIX
        value: /api
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: trader-mvp-db
          property: connectionString
      - key: COINBASE_API_BASE_URL
        value: https://api.exchange.coinbase.com
      - key: COINBASE_TIMEOUT_SECONDS
        value: "20"
      - key: COINBASE_MAX_CANDLES_PER_REQUEST
        value: "300"
      - key: COINBASE_RETRY_ATTEMPTS
        value: "5"
      - key: COINBASE_BACKOFF_MIN_SECONDS
        value: "1.0"
      - key: COINBASE_BACKOFF_MAX_SECONDS
        value: "8.0"
      - key: MARKET_DATA_INCREMENTAL_OVERLAP_CANDLES
        value: "3"
      - key: DEFAULT_SYMBOLS
        value: BTC-USD,ETH-USD,SOL-USD
      - key: DEFAULT_TIMEFRAMES
        value: 5m,15m,1h
      - key: WORKER_POLL_SECONDS
        value: "15"
      - key: WORKER_MAX_CANDLES_PER_STREAM
        value: "100"

  - type: web
    name: trader-mvp-frontend
    runtime: node
    rootDir: apps/web
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- --hostname 0.0.0.0 --port $PORT
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://trader-mvp-backend.onrender.com
